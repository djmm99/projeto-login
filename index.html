<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,700,1,200" />
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos/style.css">
    <title>Login</title>
    <link rel="stylesheet" href="estilos/midia-queries.css">
</head>
<body>
    <main>
        <section>
            <div id="img-login">
                <!-- Aqui ficara a imagem -->
            </div>
            <div id ="div-login">
                <h1>Login</h1>
                <p>
                    Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.
                </p>
                <form action="login.html" method="post">
                    <div class="dados">
                        <label for="iemail">
                            <span class="material-symbols-outlined">person</span>
                        </label>
                        <input type="email" name="email" id="iemail" placeholder="seu e-mail" required>
                    </div>
                    <div class="dados">
                        <label for="isen">
                            <span class="material-symbols-outlined">vpn_key</span>
                        </label>
                        <input type="password" name="sen" id="isen" placeholder="sua senha" required>
                    </div>
                    
                    <div>
                        <input id="entrar" type="submit" value="Entrar">
                    </div>
                    <div>
                        <a class="recuperacao" href="recuperacao.html">Esqueci a senha
                            <span id="icon-email" class="material-symbols-outlined">mail</span>
                        </a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
